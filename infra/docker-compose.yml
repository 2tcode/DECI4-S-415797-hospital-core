version: "3.9"

services:
  mongodb:
    image: mongo:8
    container_name: mongodb
    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ../backend

    container_name: backend

    env_file:
      - ../.env

    ports:
      - "5000:5000"

    volumes:
      - ../backend:/app
      - /app/node_modules

    depends_on:
      - mongodb

  appointmentservice:
    build:
      context: ../microservices/appointmentservice

    container_name: appointmentservice

    env_file:
      - ../.env

    ports:
      - "5005:5005"

    volumes:
      - ../microservices/appointmentservice:/app
      - /app/node_modules

    depends_on:
      - mongodb

  frontend:
    build:
      context: ../frontend

    container_name: frontend

    ports:
      - "5173:5173"

    environment:
      - CHOKIDAR_USEPOLLING=true

    volumes:
      - ../frontend:/app
      - /app/node_modules

    depends_on:
      - backend

volumes:
  mongo-data:
