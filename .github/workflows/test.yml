name: Hospital Project CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  backend-tests:
  runs-on: ubuntu-latest

  services:
    mongodb:
      image: mongo:8
      ports:
        - 27017:27017

  env:
    MONGODB_URI: mongodb://localhost:27017/healthcare
    MICRO_MONGODB_URI: mongodb://localhost:27017/appointments
    JWT_SECRET: test_secret

  defaults:
    run:
      working-directory: backend

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - run: npm install

    - name: Install Appointment Service Dependencies
      working-directory: microservices/appointmentservice
      run: npm install

    - run: npm test

  frontend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Run Frontend Tests
        run: npm test

      - name: Run Lighthouse
        run: npm run light
